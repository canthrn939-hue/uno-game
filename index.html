<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Online (รองรับสูงสุด 15 คน)</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c3e50; color: white; text-align: center; padding: 20px; }
        .card { background: white; color: black; padding: 20px; border-radius: 10px; display: inline-block; width: 300px; margin-top: 20px; }
        input, select, button { width: 80%; padding: 10px; margin: 8px 0; border-radius: 5px; border: none; font-size: 16px; }
        button { background: #e74c3c; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #c0392b; }
        .room-info { background: #34495e; padding: 15px; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>🎮 เกม UNO Online</h1>

    <!-- หน้าเมนูหลัก -->
    <div id="lobby" class="card">
        <h3>เข้าสู่เกม</h3>
        <input type="text" id="playerName" placeholder="ใส่ชื่อของคุณ" required><br>
        
        <hr>
        <h4>สร้างห้องใหม่</h4>
        <label>จำนวนผู้เล่น:</label>
        <select id="maxPlayers">
            <option value="2">2 คน</option>
            <option value="3">3 คน</option>
            <option value="4" selected>4 คน</option>
            <option value="5">5 คน</option>
            <option value="6">6 คน</option>
            <option value="7">7 คน</option>
            <option value="8">8 คน</option>
            <option value="9">9 คน</option>
            <option value="10">10 คน</option>
            <option value="11">11 คน</option>
            <option value="12">12 คน</option>
            <option value="13">13 คน</option>
            <option value="14">14 คน</option>
            <option value="15">15 คน</option>
        </select>
        <button onclick="createRoom()">สร้างห้อง</button>

        <hr>
        <h4>เข้าร่วมห้อง</h4>
        <input type="text" id="roomIdInput" placeholder="รหัสห้อง 5 หลัก">
        <button onclick="joinRoom()">เข้าห้อง</button>
    </div>

    <!-- หน้าห้องรอเล่น -->
    <div id="roomView" class="card" style="display:none;">
        <h2>ห้องรหัส: <span id="displayRoomId" style="color: #f1c40f;"></span></h2>
        <div class="room-info">
            <h4>รายชื่อผู้เล่นในห้อง (<span id="playerCount">0</span>):</h4>
            <ul id="playerList" style="list-style: none; padding: 0;"></ul>
        </div>
        <p>รอผู้เล่นคนอื่นเข้าร่วม...</p>
    </div>

    <script>
        const socket = io();

        function createRoom() {
            const name = document.getElementById('playerName').value;
            const maxPlayers = document.getElementById('maxPlayers').value;
            if (!name) return alert('กรุณาใส่ชื่อของคุณก่อนครับ');
            socket.emit('createRoom', { name, maxPlayers });
        }

        function joinRoom() {
            const name = document.getElementById('playerName').value;
            const roomId = document.getElementById('roomIdInput').value;
            if (!name || !roomId) return alert('กรุณากรอกชื่อและรหัสห้องให้ครบถ้วน');
            socket.emit('joinRoom', { name, roomId });
        }

        socket.on('roomCreated', ({ roomId, room }) => {
            showRoom(roomId, room);
        });

        socket.on('updateRoom', (room) => {
            showRoom(room.id, room);
        });

        socket.on('errorMsg', (msg) => {
            alert(msg);
        });

        function showRoom(roomId, room) {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('roomView').style.display = 'block';
            document.getElementById('displayRoomId').innerText = roomId;
            document.getElementById('playerCount').innerText = `${room.players.length}/${room.maxPlayers}`;
            
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            room.players.forEach(p => {
                const li = document.createElement('li');
                li.innerText = (p.isHost ? '👑 ' : '👤 ') + p.name;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
